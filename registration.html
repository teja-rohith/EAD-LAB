<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registration Form</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:#3B1B15;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    form {
      background: bisque;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }

    h3 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
      color: #555;
    }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 15px;
      transition: border-color 0.3s;
    }

    input:focus,
    select:focus {
      border-color: #007bff;
      outline: none;
    }

    button {
      padding: 10px 20px;
      margin-right: 10px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    #submit {
      background-color: #007bff;
      color: white;
    }

    #submit:hover {
      background-color: #0056b3;
    }

    #reset {
      background-color: #6c757d;
      color: white;
    }

    #reset:hover {
      background-color: #5a6268;
    }
  </style>
</head>
<body>
  <form action="#">
    <h3>Registration Form</h3>
    <label for="Name">Name:</label>
    <input type="text" id="Name" name="Name" placeholder="Enter your name" required>

    <label for="FatherName">Father Name:</label>
    <input type="text" id="FatherName" name="FatherName" placeholder="Enter father's name" required>

    <label for="PhNo">Mobile Number:</label>
    <input type="text" id="PhNo" name="PhNo" placeholder="Enter your mobile number" required>

    <label for="DoB">Date of Birth:</label>
    <input type="date" id="DoB" name="DoB" required>

    <label for="Rank">Rank:</label>
    <input type="text" id="Rank" name="Rank" placeholder="Enter your rank" required>

    <label for="College">College:</label>
    <input type="text" id="College" name="College" placeholder="Enter your college name" required>

    <label for="Address">Address:</label>
    <input type="text" id="Address" name="Address" placeholder="Enter your address" required>

    <label for="gender">Gender:</label>
    <select id="gender" name="gender" required>
      <option value="">Select gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select>

    <button type="submit" id="submit">Submit Details</button>
    <button type="reset" id="reset">Reset</button>
  </form>
</body>
</html>
